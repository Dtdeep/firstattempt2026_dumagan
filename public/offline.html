<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Career Passport - Offline</title>
    <meta name="theme-color" content="#003d82" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #f8f9fa;
        color: #171717;
        padding: 24px;
      }
      main {
        width: min(460px, 100%);
        border-radius: 16px;
        border: 1px solid #d1d5db;
        background: #ffffff;
        padding: 24px;
        text-align: center;
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.08);
      }
      .logo {
        width: 56px;
        height: 56px;
        margin: 0 auto 14px;
        border-radius: 14px;
        background: #003d82;
        display: grid;
        place-items: center;
      }
      .logo img {
        width: 28px;
        height: 28px;
        filter: brightness(0) invert(1);
      }
      h1 {
        margin: 0 0 10px;
        color: #003d82;
        font-size: 1.3rem;
      }
      p {
        margin: 0;
        line-height: 1.55;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">
        <img src="/globe.svg" alt="" />
      </div>
      <h1>You are offline</h1>
      <p>
        Career Passport cannot reach the network right now. Reconnect to continue using live
        features.
      </p>
    </main>
  </body>
</html>
